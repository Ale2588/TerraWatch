name: TerraWatch Data Pipeline
on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
    - cron: "0 3 * * 1,4"
  workflow_dispatch:
env:
  AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
  COPERNICUS_USER: ${{ secrets.COPERNICUS_USER }}
  COPERNICUS_PASS: ${{ secrets.COPERNICUS_PASS }}
jobs:
  update-air:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install requests numpy pandas geopandas
      - name: Aggiorna qualità aria
        run: python terrawatch/pipeline/run.py --layer air
      - name: Copia dati nel sito
        run: |
          cp terrawatch/data/current/air_quality.json terrawatch/site/data/
          cp terrawatch/data/current/teri_full.json terrawatch/site/data/
      - name: Commit dati
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update air quality"
          file_pattern: "terrawatch/data/current/*.json terrawatch/site/data/*.json"

  update-sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installa dipendenze
        run: pip install requests numpy rasterio
      - name: Aggiorna Sentinel-2
        run: python terrawatch/pipeline/run.py --layer sentinel
      - name: Copia dati nel sito
        run: |
          cp terrawatch/data/current/sentinel.json terrawatch/site/data/
          cp terrawatch/data/current/teri_full.json terrawatch/site/data/
      - name: Commit dati
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update sentinel-2 NDVI"
          file_pattern: "terrawatch/data/current/*.json terrawatch/site/data/*.json"
